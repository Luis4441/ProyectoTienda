<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda — Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Pacifico&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #f0f6ff;
            --card:       #ffffff;
            --blue:       #5b9bd5;
            --blue-light: #d6e8f9;
            --blue-mid:   #a8ccef;
            --blue-dark:  #3a7abf;
            --text:       #2d3e50;
            --muted:      #8aa4be;
            --border:     #ddeaf7;
            --error:      #e07070;
            --success:    #5bbf8a;
            --input-bg:   #f5f9ff;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }

        /* Círculos decorativos de fondo */
        body::before {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, #c8e0f7 0%, transparent 70%);
            top: -150px; left: -150px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, #d4ebff 0%, transparent 70%);
            bottom: -120px; right: -100px;
            pointer-events: none;
        }

        .bubble {
            position: fixed;
            border-radius: 50%;
            background: var(--blue-light);
            opacity: 0.5;
            pointer-events: none;
        }
        .bubble-1 { width: 80px; height: 80px; top: 15%; right: 12%; }
        .bubble-2 { width: 40px; height: 40px; top: 70%; left: 8%; }
        .bubble-3 { width: 60px; height: 60px; bottom: 20%; right: 20%; opacity: 0.3; }

        /* Card */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 48px 44px 40px;
            box-shadow:
                    0 8px 32px rgba(91,155,213,0.12),
                    0 2px 8px rgba(91,155,213,0.06);
            animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            text-align: center;
        }

        .logo-icon {
            width: 64px; height: 64px;
            background: var(--blue-light);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 14px;
        }

        .logo-icon svg {
            width: 32px; height: 32px;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2rem;
            color: var(--blue-dark);
            margin-bottom: 4px;
            letter-spacing: 0.01em;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 400;
        }

        /* Divider */
        .divider {
            height: 1.5px;
            background: var(--blue-light);
            border-radius: 2px;
            margin-bottom: 28px;
        }

        /* Alert */
        .alert {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .alert.error   { background: rgba(224,112,112,0.1); border: 1px solid rgba(224,112,112,0.3); color: var(--error); display: flex; }
        .alert.success { background: rgba(91,191,138,0.1);  border: 1px solid rgba(91,191,138,0.3);  color: var(--success); display: flex; }
        .alert svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-5px); }
            40%      { transform: translateX(5px); }
            60%      { transform: translateX(-3px); }
            80%      { transform: translateX(3px); }
        }
        .alert.error { animation: shake 0.4s ease; }

        /* Fields */
        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        /* Input wrapper — solución definitiva para los íconos */
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            width: 18px; height: 18px;
            fill: none;
            stroke: var(--blue-mid);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
            flex-shrink: 0;
            z-index: 2;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 13px 44px 13px 44px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 0.92rem;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(91,155,213,0.15);
        }

        input::placeholder { color: var(--blue-mid); font-weight: 400; }

        /* Eye button */
        .eye-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .eye-btn svg {
            width: 18px; height: 18px;
            fill: none;
            stroke: var(--blue-mid);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.2s;
            pointer-events: none;
        }

        .eye-btn:hover svg { stroke: var(--blue); }

        /* Submit */
        .btn-submit {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 0.92rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(58,122,191,0.3);
        }

        .btn-submit:hover:not(:disabled) {
            opacity: 0.92;
            box-shadow: 0 6px 20px rgba(58,122,191,0.4);
        }

        .btn-submit:active:not(:disabled) { transform: scale(0.99); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }

        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .card-footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-footer p { font-size: 0.72rem; color: var(--muted); font-weight: 600; }

        .version-badge {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--blue);
            background: var(--blue-light);
            border-radius: 20px;
            padding: 3px 10px;
            letter-spacing: 0.06em;
        }

        @media (max-width: 480px) {
            .card { padding: 36px 24px 30px; border-radius: 20px; }
        }
    </style>
</head>
<body>

<div class="bubble bubble-1"></div>
<div class="bubble bubble-2"></div>
<div class="bubble bubble-3"></div>

<div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
        <div class="logo-icon">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 8h24l-2.5 12H6.5L4 8z" fill="#a8ccef" stroke="#3a7abf" stroke-width="1.5" stroke-linejoin="round"/>
                <circle cx="11" cy="26" r="2" fill="#3a7abf"/>
                <circle cx="21" cy="26" r="2" fill="#3a7abf"/>
                <path d="M2 4h3l2 4" stroke="#3a7abf" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M13 13h6M10 16h12" stroke="#3a7abf" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>Tienda</h1>
        <p class="subtitle">Sistema de Gestión Comercial</p>
    </div>

    <div class="divider"></div>

    <!-- Alert -->
    <div class="alert" id="alertBox" role="alert" aria-live="polite">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertMsg"></span>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>

        <div class="field">
            <label for="nombreUsuario">Usuario</label>
            <div class="input-wrap">
                <!-- Ícono usuario -->
                <svg class="input-icon" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <input
                        type="text"
                        id="nombreUsuario"
                        name="nombreUsuario"
                        autocomplete="username"
                        placeholder="Nombre de usuario"
                        required
                />
            </div>
        </div>

        <div class="field">
            <label for="contrasena">Contraseña</label>
            <div class="input-wrap">
                <!-- Ícono candado -->
                <svg class="input-icon" viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input
                        type="password"
                        id="contrasena"
                        name="contrasena"
                        autocomplete="current-password"
                        placeholder="••••••••••"
                        required
                />
                <!-- Botón ojo -->
                <button type="button" class="eye-btn" id="eyeBtn" aria-label="Mostrar contraseña">
                    <svg id="eyeIcon" viewBox="0 0 24 24">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
            <div class="btn-inner">
                <span id="btnText">Ingresar al sistema</span>
                <div class="spinner" id="spinner"></div>
            </div>
        </button>

    </form>

    <!-- Footer -->
    <div class="card-footer">
        <p>© 2025 Tienda Genérica</p>
        <span class="version-badge">v1.0.0</span>
    </div>

</div>

<script>
    // ── Mostrar / ocultar contraseña ──
    const eyeBtn   = document.getElementById('eyeBtn');
    const eyeIcon  = document.getElementById('eyeIcon');
    const passInput = document.getElementById('contrasena');

    eyeBtn.addEventListener('click', () => {
        const oculta = passInput.type === 'password';
        passInput.type = oculta ? 'text' : 'password';
        eyeBtn.setAttribute('aria-label', oculta ? 'Ocultar contraseña' : 'Mostrar contraseña');

        eyeIcon.innerHTML = oculta
            ? `<line x1="1"  y1="1"  x2="23" y2="23"/>
           <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
           <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
           <path d="M9.9 9.9a3 3 0 1 0 4.2 4.2"/>`
            : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });

    // ── Alert ──
    function showAlert(type, msg) {
        const box  = document.getElementById('alertBox');
        const text = document.getElementById('alertMsg');
        box.className = `alert ${type}`;
        text.textContent = msg;
    }

    function hideAlert() {
        document.getElementById('alertBox').className = 'alert';
    }

    // ── Loading ──
    function setLoading(on) {
        const btn     = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        btn.disabled          = on;
        btnText.style.display = on ? 'none' : 'inline';
        spinner.style.display = on ? 'block' : 'none';
    }

    // ── Submit ──
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAlert();

        const nombreUsuario = document.getElementById('nombreUsuario').value.trim();
        const contrasena    = document.getElementById('contrasena').value;

        if (!nombreUsuario || !contrasena) {
            showAlert('error', 'Por favor completa todos los campos.');
            return;
        }

        setLoading(true);

        try {
            const res = await fetch('/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ nombreUsuario, contrasena })
            });

            const data = await res.json();

            if (!res.ok) throw new Error(data.error || 'Usuario o contraseña errados, intente de nuevo.');

            localStorage.setItem('token', data.token);
            showAlert('success', '¡Acceso concedido! Redirigiendo...');
            setTimeout(() => { window.location.href = '/dashboard'; }, 900);

        } catch (err) {
            showAlert('error', err.message);
            setLoading(false);
        }
    });

    document.getElementById('nombreUsuario').focus();
</script>
</body>
</html>
