<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso al Sistema — Gestión Comercial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0c0d0f;
            --panel:     #13151a;
            --border:    rgba(255,255,255,0.07);
            --gold:      #c9a84c;
            --gold-dim:  #9c7e36;
            --text:      #e8e4dc;
            --muted:     #6b6860;
            --error:     #e05555;
            --success:   #4caf7d;
            --input-bg:  #1a1d24;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        /* ── Ambient background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                    radial-gradient(ellipse 70% 50% at 20% 80%, rgba(201,168,76,0.07) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 60% at 80% 10%, rgba(201,168,76,0.04) 0%, transparent 55%);
            pointer-events: none;
        }

        /* ── Grain overlay ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.35;
            pointer-events: none;
        }

        /* ── Decorative side lines ── */
        .deco-line {
            position: fixed;
            background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
            width: 1px;
            height: 60%;
            top: 20%;
            opacity: 0.3;
        }
        .deco-line.left  { left: 48px; }
        .deco-line.right { right: 48px; }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 56px 48px 48px;
            box-shadow:
                    0 0 0 1px rgba(201,168,76,0.08),
                    0 40px 80px rgba(0,0,0,0.6),
                    0 8px 24px rgba(0,0,0,0.4);
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Gold top accent ── */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            border-radius: 0 0 2px 2px;
        }

        /* ── Header ── */
        .logo-mark {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 36px; height: 36px;
            border: 1.5px solid var(--gold-dim);
            border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .logo-icon svg { width: 18px; height: 18px; fill: var(--gold); }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text);
            line-height: 1.2;
        }
        .logo-text span { display: block; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 300; margin-top: 2px; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 300;
            margin-bottom: 36px;
            letter-spacing: 0.02em;
        }

        /* ── Form ── */
        .field { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px; height: 16px;
            fill: none;
            stroke: var(--muted);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.2s;
            pointer-events: none;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 12px 14px 12px 42px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            letter-spacing: 0.01em;
        }

        input:focus {
            border-color: var(--gold-dim);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
        }
        input:focus + svg,
        .input-wrap:focus-within svg { stroke: var(--gold); }

        /* fix icon position — svg is after input in DOM */
        .input-wrap input { order: 1; }
        .input-wrap { display: flex; flex-direction: column; }
        .input-wrap input,
        .input-wrap .ico { position: relative; }
        /* override: use absolute positioning approach */
        .input-wrap { display: block; position: relative; }

        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .eye-btn:hover { opacity: 0.9; }
        .eye-btn svg { width: 16px; height: 16px; fill: none; stroke: var(--text); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

        /* ── Alert ── */
        .alert {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 3px;
            font-size: 0.82rem;
            margin-bottom: 20px;
            animation: shake 0.4s ease;
        }
        .alert.error   { background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.25); color: var(--error); display: flex; }
        .alert.success { background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.25); color: var(--success); display: flex; }
        .alert svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-6px); }
            40%      { transform: translateX(6px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            background: var(--gold);
            border: none;
            border-radius: 3px;
            color: #0c0d0f;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover:not(:disabled) {
            background: #d4b05a;
            box-shadow: 0 6px 24px rgba(201,168,76,0.3);
        }

        .btn-submit:active:not(:disabled) { transform: scale(0.99); }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-submit .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ── */
        .card-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-footer p {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .version-badge {
            font-size: 0.68rem;
            color: var(--gold-dim);
            background: rgba(201,168,76,0.06);
            border: 1px solid rgba(201,168,76,0.15);
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.08em;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 40px 28px 36px; }
            .deco-line { display: none; }
        }
    </style>
</head>
<body>

<div class="deco-line left"></div>
<div class="deco-line right"></div>

<div class="card" role="main">

    <!-- Logo -->
    <div class="logo-mark">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 6h18M3 12h18M3 18h12M16 15l3 3 5-5" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
        </div>
        <div class="logo-text">
            Gestión Comercial
            <span>Sistema de Transacciones</span>
        </div>
    </div>

    <!-- Heading -->
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Ingresa tus credenciales para acceder al sistema</p>

    <!-- Alert -->
    <div class="alert" id="alertBox" role="alert" aria-live="polite">
        <svg id="alertIcon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertMsg"></span>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>
        <div class="field">
            <label for="nombreUsuario">Usuario</label>
            <div class="input-wrap">
                <input
                        type="text"
                        id="nombreUsuario"
                        name="nombreUsuario"
                        autocomplete="username"
                        placeholder="Nombre de usuario"
                        required
                />
                <!-- user icon -->
                <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
        </div>

        <div class="field">
            <label for="contrasena">Contraseña</label>
            <div class="input-wrap">
                <input
                        type="password"
                        id="contrasena"
                        name="contrasena"
                        autocomplete="current-password"
                        placeholder="••••••••••"
                        required
                />
                <!-- lock icon -->
                <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <!-- eye toggle -->
                <button type="button" class="eye-btn" id="eyeBtn" aria-label="Mostrar contraseña">
                    <svg id="eyeIcon" viewBox="0 0 24 24">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
            <span id="btnText">Ingresar al sistema</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </form>

    <!-- Footer -->
    <div class="card-footer">
        <p>© 2025 Gestión Comercial</p>
        <span class="version-badge">v1.0.0</span>
    </div>

</div>

<script>
    // ── Eye toggle ──
    const eyeBtn  = document.getElementById('eyeBtn');
    const eyeIcon = document.getElementById('eyeIcon');
    const passInput = document.getElementById('contrasena');

    eyeBtn.addEventListener('click', () => {
        const isHidden = passInput.type === 'password';
        passInput.type = isHidden ? 'text' : 'password';
        eyeIcon.innerHTML = isHidden
            ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
            : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
        eyeBtn.setAttribute('aria-label', isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });

    // ── Alert helper ──
    function showAlert(type, msg) {
        const box  = document.getElementById('alertBox');
        const text = document.getElementById('alertMsg');
        box.className = `alert ${type}`;
        text.textContent = msg;
    }

    function hideAlert() {
        const box = document.getElementById('alertBox');
        box.className = 'alert';
    }

    // ── Loading state ──
    function setLoading(on) {
        const btn     = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        btn.disabled           = on;
        btnText.style.display  = on ? 'none' : 'block';
        spinner.style.display  = on ? 'block' : 'none';
    }

    // ── Form submit ──
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAlert();

        const nombreUsuario = document.getElementById('nombreUsuario').value.trim();
        const contrasena    = document.getElementById('contrasena').value;

        if (!nombreUsuario || !contrasena) {
            showAlert('error', 'Por favor completa todos los campos.');
            return;
        }

        setLoading(true);

        try {
            const res = await fetch('/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ nombreUsuario, contrasena })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error || 'Error al iniciar sesión');
            }

            // Guardar token
            localStorage.setItem('token', data.token);

            // Feedback de éxito
            showAlert('success', '¡Acceso concedido! Redirigiendo...');

            // Redirigir al dashboard
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 900);

        } catch (err) {
            showAlert('error', err.message);
            setLoading(false);

            // Shake animation reset
            const box = document.getElementById('alertBox');
            box.style.animation = 'none';
            requestAnimationFrame(() => { box.style.animation = ''; });
        }
    });

    // ── Auto-focus ──
    document.getElementById('nombreUsuario').focus();
</script>
</body>
</html>
