<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes — Tienda</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Pacifico&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f0f6ff; --surface: #ffffff; --sidebar-bg: #1e3a5f; --sidebar-w: 240px;
            --blue: #5b9bd5; --blue-light: #d6e8f9; --blue-mid: #a8ccef; --blue-dark: #3a7abf;
            --blue-soft: #e8f3fd; --text: #2d3e50; --muted: #7a9ab8; --border: #ddeaf7;
            --danger: #e07070; --danger-bg: #fdf0f0; --success: #4caf7d; --success-bg: #f0fdf6;
        }
        html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        .shell { display: flex; height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); display: flex; flex-direction: column; flex-shrink: 0; position: relative; z-index: 10; }
        .sidebar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, #a8d8f0, var(--blue-mid), #a8d8f0); }
        .sidebar-brand { padding: 28px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); cursor: pointer; }
        .brand-logo { display: flex; align-items: center; gap: 10px; }
        .brand-icon { width: 34px; height: 34px; background: rgba(255,255,255,0.1); border: 1.5px solid rgba(168,204,239,0.4); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .brand-icon svg { width: 18px; height: 18px; }
        .brand-name { font-family: 'Pacifico', cursive; font-size: 1.1rem; color: #e8f3fd; line-height: 1; }
        .brand-sub { font-size: 0.62rem; color: rgba(255,255,255,0.35); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; font-weight: 400; }
        .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 12px 16px; margin: 16px 12px 0; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--blue-mid); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; color: var(--sidebar-bg); flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 0.78rem; font-weight: 700; color: #e8f3fd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 0.62rem; color: var(--blue-mid); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
        .sidebar-nav { flex: 1; padding: 20px 12px; overflow-y: auto; }
        .nav-section-label { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 0 8px; margin-bottom: 6px; margin-top: 20px; font-weight: 700; }
        .nav-section-label:first-child { margin-top: 0; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background 0.15s; color: rgba(255,255,255,0.5); font-size: 0.83rem; font-weight: 600; border: none; background: none; width: 100%; text-align: left; position: relative; margin-bottom: 2px; }
        .nav-item svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
        .nav-item.active { background: rgba(168,204,239,0.18); color: #c8e4f8; }
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 25%; bottom: 25%; width: 3px; background: var(--blue-mid); border-radius: 3px; }
        .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
        .btn-logout { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; background: none; border: 1px solid rgba(224,112,112,0.25); border-radius: 10px; color: rgba(224,112,112,0.65); font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
        .btn-logout svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .btn-logout:hover { background: rgba(224,112,112,0.1); color: var(--danger); border-color: rgba(224,112,112,0.45); }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 0 32px; height: 62px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: 0 2px 8px rgba(91,155,213,0.06); }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .page-title { font-size: 1.05rem; font-weight: 800; color: var(--text); }
        .page-badge { font-size: 0.65rem; background: var(--blue-light); color: var(--blue-dark); border: 1px solid rgba(91,155,213,0.2); padding: 3px 10px; border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }
        .topbar-date { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
        .content { flex: 1; overflow-y: auto; padding: 32px; }

        /* MODULE HEADER */
        .module-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1.5px solid var(--border); flex-wrap: wrap; gap: 12px; }
        .module-title { font-size: 1.6rem; font-weight: 800; color: var(--text); line-height: 1; }
        .module-desc { font-size: 0.82rem; color: var(--muted); margin-top: 5px; font-weight: 400; }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        /* BOTONES DE REPORTE */
        .reporte-btns { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
        .btn-reporte { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
        .btn-reporte svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .btn-reporte:hover { border-color: var(--blue-mid); color: var(--blue-dark); background: var(--blue-soft); }
        .btn-reporte.active { background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%); border-color: transparent; color: #fff; box-shadow: 0 3px 12px rgba(58,122,191,0.25); }

        /* TABLA */
        .table-wrap { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(91,155,213,0.06); }
        .table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
        .table-toolbar-title { font-size: 0.9rem; font-weight: 800; color: var(--text); }
        .table-count { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: var(--bg); padding: 12px 16px; text-align: left; font-size: 0.68rem; font-weight: 800; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--blue-soft); }
        tbody td { padding: 13px 16px; font-size: 0.83rem; color: var(--text); font-weight: 600; vertical-align: middle; }
        .td-muted { color: var(--muted); font-weight: 400; }
        .td-total { font-weight: 800; color: var(--blue-dark); }

        /* TOTAL VENTAS */
        .total-bar { display: flex; justify-content: flex-end; padding: 14px 20px; border-top: 1.5px solid var(--border); background: var(--bg); }
        .total-label { font-size: 0.85rem; font-weight: 800; color: var(--text); }
        .total-value { font-size: 0.85rem; font-weight: 800; color: var(--blue-dark); margin-left: 12px; }

        /* EMPTY STATE */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 40px; text-align: center; }
        .empty-icon { width: 52px; height: 52px; background: var(--blue-soft); border: 1.5px solid var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
        .empty-icon svg { width: 22px; height: 22px; fill: none; stroke: var(--blue); stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
        .empty-title { font-size: 0.92rem; font-weight: 800; color: var(--text); margin-bottom: 5px; }
        .empty-text { font-size: 0.78rem; color: var(--muted); max-width: 260px; line-height: 1.6; }

        /* TOAST */
        .toast { position: fixed; bottom: 28px; right: 28px; background: var(--text); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 0.82rem; font-weight: 700; box-shadow: 0 8px 24px rgba(30,58,95,0.2); z-index: 200; display: flex; align-items: center; gap: 10px; transform: translateY(60px); opacity: 0; transition: all 0.3s cubic-bezier(0.22,1,0.36,1); pointer-events: none; }
        .toast.visible { transform: translateY(0); opacity: 1; }
        .toast.toast-error { background: var(--danger); }

        /* SPINNER */
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        @media (max-width: 768px) {
            .sidebar { width: 56px; }
            .sidebar .brand-name, .sidebar .brand-sub, .sidebar .user-info,
            .nav-item span, .nav-section-label, .btn-logout span { display: none; }
            .nav-item { justify-content: center; padding: 12px; }
            .btn-logout { justify-content: center; }
            .content { padding: 16px; }
            .topbar { padding: 0 16px; }
        }
    </style>
</head>
<body>
<div class="shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand" onclick="window.location.href='/dashboard'">
            <div class="brand-logo">
                <div class="brand-icon">
                    <svg viewBox="0 0 32 32" fill="none">
                        <path d="M4 8h24l-2.5 12H6.5L4 8z" fill="rgba(168,204,239,0.3)" stroke="#a8ccef" stroke-width="1.5" stroke-linejoin="round"/>
                        <circle cx="11" cy="26" r="2" fill="#a8ccef"/>
                        <circle cx="21" cy="26" r="2" fill="#a8ccef"/>
                        <path d="M2 4h3l2 4" stroke="#a8ccef" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div>
                    <div class="brand-name">Tienda</div>
                    <div class="brand-sub">Sistema Comercial</div>
                </div>
            </div>
        </div>

        <div class="sidebar-user">
            <div class="user-avatar" id="userInitial">A</div>
            <div class="user-info">
                <div class="user-name" id="userName">Cargando...</div>
                <div class="user-role" id="userRoleLabel">Administrador</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">General</div>
            <button class="nav-item" onclick="window.location.href='/dashboard'">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Inicio</span>
            </button>
            <div class="nav-section-label">Personas</div>
            <button class="nav-item" onclick="window.location.href='/clientes'">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Clientes</span>
            </button>
            <button class="nav-item" onclick="window.location.href='/proveedores'">
                <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                <span>Proveedores</span>
            </button>
            <div class="nav-section-label">Inventario &amp; Ventas</div>
            <button class="nav-item" onclick="window.location.href='/productos'">
                <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                <span>Productos</span>
            </button>
            <button class="nav-item" onclick="window.location.href='/ventas'">
                <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <span>Ventas</span>
            </button>
            <div class="nav-section-label">Análisis</div>
            <button class="nav-item active">
                <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                <span>Reportes</span>
            </button>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Cerrar sesión</span>
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
        <header class="topbar">
            <div class="topbar-left">
                <span class="page-title">Reportes</span>
                <span class="page-badge">Consultas</span>
            </div>
            <span class="topbar-date" id="topbarDate"></span>
        </header>

        <div class="content">
            <div class="module-header">
                <div>
                    <div class="module-title">Módulo de Reportes</div>
                    <div class="module-desc">Consultas y estadísticas del sistema</div>
                </div>
            </div>

            <!-- BOTONES DE SELECCIÓN -->
            <div class="reporte-btns">
                <button class="btn-reporte active" id="btn-usuarios" onclick="cargarReporte('usuarios')">
                    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Listado de Usuarios
                </button>
                <button class="btn-reporte" id="btn-clientes" onclick="cargarReporte('clientes')">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Listado de Clientes
                </button>
                <button class="btn-reporte" id="btn-ventas" onclick="cargarReporte('ventas')">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Ventas por Cliente
                </button>
            </div>

            <!-- CONTENIDO DEL REPORTE -->
            <div class="table-wrap" id="reporteContenido">
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    </div>
                    <div class="empty-title">Cargando reporte...</div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
    // AUTH
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';
    let payload = null;
    try { payload = JSON.parse(atob(token.split('.')[1])); }
    catch { localStorage.removeItem('token'); window.location.href = '/login'; }

    // INIT
    (function init() {
        document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('es-CO', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
        const nombre = payload.nombreUsuario || 'Usuario';
        document.getElementById('userInitial').textContent   = nombre.charAt(0).toUpperCase();
        document.getElementById('userName').textContent      = nombre;
        document.getElementById('userRoleLabel').textContent = payload.nombreUsuario === 'admininicial' ? 'Admin Principal' : 'Administrador';
        cargarReporte('usuarios');
    })();

    document.getElementById('btnLogout').addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });

    function headers() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    // TOAST
    let toastTimer = null;
    function mostrarToast(msg, tipo = 'success') {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        t.className = `toast toast-${tipo} visible`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('visible'), 3200);
    }

    // CAMBIAR BOTÓN ACTIVO
    function setBotonActivo(reporte) {
        ['usuarios', 'clientes', 'ventas'].forEach(r => {
            document.getElementById(`btn-${r}`).classList.toggle('active', r === reporte);
        });
    }

    // CARGAR REPORTE
    async function cargarReporte(tipo) {
        setBotonActivo(tipo);
        document.getElementById('reporteContenido').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg></div>
        <div class="empty-title">Cargando...</div>
      </div>`;

        try {
            const urls = {
                usuarios: '/api/reportes/usuarios',
                clientes: '/api/reportes/clientes',
                ventas:   '/api/reportes/ventas-por-cliente'
            };
            const res  = await fetch(urls[tipo], { headers: headers() });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Error al cargar');

            if      (tipo === 'usuarios') renderUsuarios(data);
            else if (tipo === 'clientes') renderClientes(data);
            else if (tipo === 'ventas')   renderVentas(data);

        } catch (err) {
            document.getElementById('reporteContenido').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
          <div class="empty-title">Error al cargar</div>
          <div class="empty-text">${err.message}</div>
        </div>`;
            mostrarToast(err.message, 'error');
        }
    }

    // a) LISTADO DE USUARIOS
    function renderUsuarios(lista) {
        if (lista.length === 0) {
            document.getElementById('reporteContenido').innerHTML = `
        <div class="table-toolbar"><span class="table-toolbar-title">Listado de Usuarios</span><span class="table-count">0 usuarios</span></div>
        <div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="empty-title">Sin usuarios</div></div>`;
            return;
        }
        const filas = lista.map(u => `
      <tr>
        <td><strong>${u.cedula || '—'}</strong></td>
        <td>${u.nombre_completo || '—'}</td>
        <td class="td-muted">${u.correo || '—'}</td>
        <td>${u.nombre_usuario || '—'}</td>
        <td class="td-muted">${u.contrasena || '—'}</td>
      </tr>`).join('');

        document.getElementById('reporteContenido').innerHTML = `
      <div class="table-toolbar">
        <span class="table-toolbar-title">Listado de Usuarios</span>
        <span class="table-count">${lista.length} usuario${lista.length !== 1 ? 's' : ''}</span>
      </div>
      <table>
        <thead><tr><th>Cédula</th><th>Nombre Completo</th><th>Correo Electrónico</th><th>Usuario</th><th>Password</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>`;
    }

    // b) LISTADO DE CLIENTES
    function renderClientes(lista) {
        if (lista.length === 0) {
            document.getElementById('reporteContenido').innerHTML = `
        <div class="table-toolbar"><span class="table-toolbar-title">Listado de Clientes</span><span class="table-count">0 clientes</span></div>
        <div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="empty-title">Sin clientes</div></div>`;
            return;
        }
        const filas = lista.map(c => `
      <tr>
        <td><strong>${c.cedula || '—'}</strong></td>
        <td>${c.nombre_completo || '—'}</td>
        <td class="td-muted">${c.correo || '—'}</td>
        <td class="td-muted">${c.direccion || '—'}</td>
        <td class="td-muted">${c.telefono || '—'}</td>
      </tr>`).join('');

        document.getElementById('reporteContenido').innerHTML = `
      <div class="table-toolbar">
        <span class="table-toolbar-title">Listado de Clientes</span>
        <span class="table-count">${lista.length} cliente${lista.length !== 1 ? 's' : ''}</span>
      </div>
      <table>
        <thead><tr><th>Cédula</th><th>Nombre Completo</th><th>Correo Electrónico</th><th>Dirección</th><th>Teléfono</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>`;
    }

    // c) VENTAS POR CLIENTE
    function renderVentas(lista) {
        const total = lista.reduce((acc, c) => acc + parseFloat(c.valor_total_ventas || 0), 0);

        if (lista.length === 0) {
            document.getElementById('reporteContenido').innerHTML = `
        <div class="table-toolbar"><span class="table-toolbar-title">Total de Ventas por Cliente</span><span class="table-count">0 clientes</span></div>
        <div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="empty-title">Sin ventas registradas</div></div>`;
            return;
        }

        const filas = lista.map(c => `
      <tr>
        <td><strong>${c.cedula || '—'}</strong></td>
        <td>${c.nombre_completo || '—'}</td>
        <td class="td-total">$${parseFloat(c.valor_total_ventas).toLocaleString('es-CO', {minimumFractionDigits: 2})}</td>
      </tr>`).join('');

        document.getElementById('reporteContenido').innerHTML = `
      <div class="table-toolbar">
        <span class="table-toolbar-title">Total de Ventas por Cliente</span>
        <span class="table-count">${lista.length} cliente${lista.length !== 1 ? 's' : ''}</span>
      </div>
      <table>
        <thead><tr><th>Cédula</th><th>Nombre</th><th>Valor Total Ventas</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>
      <div class="total-bar">
        <span class="total-label">Total Ventas $</span>
        <span class="total-value">${total.toLocaleString('es-CO', {minimumFractionDigits: 2})}</span>
      </div>`;
    }
</script>
</body>
</html>
